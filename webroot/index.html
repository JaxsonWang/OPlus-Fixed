<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPlus-Fixed WebUI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 10px;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .content {
      padding: 12px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 24px;
    }

    .info-card {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .info-item {
      padding: 8px 0;
      border-bottom: 1px solid #dee2e6;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      font-weight: 500;
      color: #495057;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .info-value {
      color: #212529;
      font-family: monospace;
      font-size: 12px;
    }

    .info-value pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: white;
      padding: 6px;
      border: 1px solid #dee2e6;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.3;
    }

    .action-card {
      background: #f8f9fa;
      border-left: 4px solid #28a745;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .action-title {
      font-weight: 600;
      color: #212529;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: #495057;
    }

    .hash-input {
      padding: 10px 12px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .hash-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #28a745;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #218838;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #5a6268;
    }

    .info-text {
      font-size: 12px;
      color: #6c757d;
      margin-top: 5px;
      line-height: 1.3;
    }

    @media (max-width: 600px) {
      .input-row {
        flex-direction: column;
      }
    }

    .output-section {
      background: #f8f9fa;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 12px;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #e9ecef;
      border-bottom: 1px solid #dee2e6;
    }

    .output-title {
      font-weight: 600;
      color: #495057;
      font-size: 13px;
    }

    .output-controls {
      display: flex;
      gap: 6px;
    }

    .btn-small {
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 4px;
    }

    #output {
      margin: 10px;
      padding: 10px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.4;
      max-height: 250px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #212529;
      min-height: 60px;
    }

    .status-success {
      color: #28a745;
    }

    .status-error {
      color: #dc3545;
    }

    .status-info {
      color: #667eea;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>OPlus-Fixed WebUI</h1>
      <p>ColorOS 根据设备信息管理</p>
    </div>

    <div class="content">
      <div class="info-card">
        <div class="info-item">
          <span class="info-label">模块版本</span>
          <span class="info-value" id="moduleVersion">oplus_fixed</span>
        </div>
        <div class="info-item">
          <div class="info-label">当前 vbmeta digest</div>
          <div class="info-value">
            <pre id="currentDigest">加载中...</pre>
          </div>
        </div>
        <div class="info-item">
          <span class="info-label">Android 版本</span>
          <span class="info-value" id="androidVersion">加载中...</span>
        </div>
        <div class="info-item">
          <span class="info-label">设备型号</span>
          <span class="info-value" id="deviceModel">加载中...</span>
        </div>
      </div>

      <div class="action-card">
        <div class="action-title">设置 Boot Vbmeta Hash</div>
        <div class="input-group">
          <div class="input-wrapper">
            <label class="input-label" for="hashInput">Vbmeta Digest (SHA256 Hash)</label>
            <input type="text" id="hashInput" class="hash-input"
              placeholder="例如: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" maxlength="128"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <div class="info-text">
              请输入 64 位十六进制 SHA256 hash 值
            </div>
          </div>
          <div class="input-row">
            <button class="btn btn-primary" id="setHashBtn">
              ✅ 设置 boot vbmeta hash
            </button>
          </div>
        </div>
      </div>

      <div class="output-section">
        <div class="output-header">
          <span class="output-title">操作日志</span>
          <div class="output-controls">
            <button class="btn btn-secondary btn-small" id="clearBtn">清空</button>
            <button class="btn btn-secondary btn-small" id="copyBtn">📋 复制</button>
          </div>
        </div>
        <pre id="output">等待操作...</pre>
      </div>
    </div>
  </div>

  <script type="module">
    import { exec } from "./js/index.js";

    // Get DOM elements
    const hashInput = document.getElementById("hashInput");
    const setHashBtn = document.getElementById("setHashBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const output = document.getElementById("output");
    const moduleVersionEl = document.getElementById("moduleVersion");
    const currentDigestEl = document.getElementById("currentDigest");
    const androidVersionEl = document.getElementById("androidVersion");
    const deviceModelEl = document.getElementById("deviceModel");

    // Load initial info
    async function loadInfo() {
      try {
        updateOutput("正在获取设备信息...", "info");

        // Get current vbmeta digest
        const currentRes = await exec("getprop ro.boot.vbmeta.digest");
        const currentDigest = currentRes.stdout.trim();
        currentDigestEl.textContent = currentDigest || "未设置";
        updateOutput(`✓ 当前 vbmeta digest: ${currentDigest || "未设置"}`, "success");

        // Get Android version
        const androidRes = await exec("getprop ro.build.version.release");
        const androidVersion = androidRes.stdout.trim();
        androidVersionEl.textContent = androidVersion || "未知";
        updateOutput(`✓ Android 版本: ${androidVersion || "未知"}`, "success");

        // Get device model
        const modelRes = await exec("getprop ro.product.model");
        const deviceModel = modelRes.stdout.trim();
        deviceModelEl.textContent = deviceModel || "未知";
        updateOutput(`✓ 设备型号: ${deviceModel || "未知"}`, "success");

        updateOutput("\n信息加载完成！", "success");
      } catch (error) {
        updateOutput(`✗ 错误: ${error.message}`, "error");
      }
    }

    // Update output helper
    function updateOutput(text, type = "info") {
      output.textContent += text + "\n";
      output.className = `status-${type}`;
      output.scrollTop = output.scrollHeight;
    }

    // Clear output
    clearBtn.addEventListener("click", () => {
      output.textContent = "日志已清空。\n";
      output.className = "";
    });

    // Copy output
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.textContent);
        copyBtn.textContent = "✓ 已复制";
        setTimeout(() => {
          copyBtn.textContent = "📋 复制";
        }, 2000);
      } catch (error) {
        updateOutput("✗ 复制失败: " + error.message, "error");
      }
    });

    // Set vbmeta hash
    setHashBtn.addEventListener("click", async () => {
      const hashValue = hashInput.value.trim();

      // Input validation
      if (!hashValue) {
        updateOutput("✗ 错误: 请输入 vbmeta digest 值", "error");
        return;
      }

      // Validate hex format
      if (!/^[0-9a-fA-F]{64}$/.test(hashValue)) {
        updateOutput("✗ 错误: Hash 值必须是 64 位十六进制字符", "error");
        updateOutput(`当前输入长度: ${hashValue.length} 位`, "error");
        return;
      }

      const confirmMsg = `确定设置 boot vbmeta digest 为以下值吗？\n\n${hashValue}\n\n此操作将修改系统属性。`;

      if (!confirm(confirmMsg)) {
        return;
      }

      setHashBtn.disabled = true;
      hashInput.disabled = true;

      updateOutput("正在设置 vbmeta digest...");
      updateOutput(`值: ${hashValue}`, "info");
      updateOutput("=".repeat(60), "info");

      try {
        const res = await exec(`resetprop ro.boot.vbmeta.digest ${hashValue}`);

        updateOutput("=".repeat(60), "info");
        updateOutput(`操作完成，退出码: ${res.errno}`, "info");
        updateOutput("=".repeat(60), "info");

        if (res.stdout) {
          updateOutput("【输出】\n" + res.stdout, "info");
        }

        if (res.stderr) {
          updateOutput("\n【错误】\n" + res.stderr, "error");
          output.className = "status-error";
        } else if (res.errno === 0) {
          // Verify the value was set
          const verifyRes = await exec("getprop ro.boot.vbmeta.digest");
          const verifyDigest = verifyRes.stdout.trim();
          currentDigestEl.textContent = verifyDigest || "未知";

          updateOutput("\n✓ 操作成功！", "success");
          updateOutput(`当前 vbmeta digest: ${verifyDigest || "未知"}`, "success");

          if (verifyDigest.toLowerCase() === hashValue.toLowerCase()) {
            updateOutput("✓ 验证通过，值已正确设置", "success");
          } else {
            updateOutput("⚠ 警告: 验证值与输入值不匹配", "error");
          }
        } else {
          updateOutput(`\n✗ 设置失败，退出码: ${res.errno}`, "error");
          output.className = "status-error";
        }
      } catch (error) {
        updateOutput(`\n✗ 执行异常: ${error.message}`, "error");
        output.className = "status-error";
      } finally {
        setHashBtn.disabled = false;
        hashInput.disabled = false;
      }
    });

    // Auto-load info on page load
    setTimeout(() => {
      loadInfo();
    }, 500);
  </script>
</body>

</html>
